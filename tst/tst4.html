<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جلب سعر سهم AAPL - حل مشكلة CORS</title>
    <!-- تضمين Tailwind CSS لتصميم سريع وجميل -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f7f9;
        }
    </style>
</head>
<body>

<div class="bg-white p-8 rounded-xl shadow-2xl max-w-lg w-full text-center">
    <h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-3">جلب بيانات أسهم Apple (AAPL)</h1>
    
    <div id="result" class="text-xl font-medium text-blue-600 p-4 bg-blue-50 rounded-lg border border-blue-200">
        جارٍ جلب البيانات...
    </div>

    <p class="mt-6 text-sm text-gray-500">
        تم التبديل إلى Alpha Vantage API. يرجى الملاحظة أن مفاتيح الـ API التجريبية لها حدود قصوى صارمة للطلبات.
    </p>
</div>

<script>
    // ******************************************************
    // الكود الذي يستخدم Alpha Vantage
    // ******************************************************
    
    // مفتاح API تجريبي آخر متاح للجميع من Alpha Vantage (JavaScript Demo Key)
    // نستخدمه كمحاولة أخيرة لتجاوز حدود المفتاح "demo" السابق
    const ALPHA_VANTAGE_API_KEY = 'JAVASCRIPT_DEMO'; 

    // الرابط لطلب سعر السهم اليومي (Global Quote) من Alpha Vantage لـ AAPL
    const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=AAPL&apikey=${ALPHA_VANTAGE_API_KEY}`;
    //const url2 = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=AAPL&apikey=JAVASCRIPT_DEMO`;
    
    // لم نعد نحتاج إلى الخادم الوكيل (proxyUrl) لأن Alpha Vantage يسمح بطلبات CORS المباشرة.
    const apiKey = ""; 

    async function fetchStockData() {
        // عرض حالة التحميل
        const resultElement = document.getElementById('result');
        resultElement.classList.remove('text-red-600', 'bg-red-50', 'border-red-200', 'text-green-600', 'bg-green-50', 'border-green-200');
        resultElement.classList.add('text-blue-600', 'bg-blue-50', 'border-blue-200');
        resultElement.innerText = 'جارٍ جلب البيانات...';
        
        try {
            // الطلب المباشر (بدون خادم وكيل)
            const response = await fetch(url, {
                method: 'GET'
            });

            if (!response.ok) {
                // خطأ HTTP
                throw new Error(`خطأ HTTP! حالة الرد: ${response.status}.`);
            }

            const data = await response.json();
            console.log(data);
			
            // =======================================================
            // معالجة الأخطاء والقيود
            // =======================================================
            if (data.Note) {
                // Alpha Vantage يرسل "Note" عند تجاوز الحد الأقصى للطلبات
                throw new Error(`تم تجاوز الحد الأقصى للطلبات التجريبية. يرجى الحصول على مفتاح API خاص بك.`);
            }

            // التحقق من وجود رسالة خطأ صريحة من الـ API
            if (data['Error Message']) {
                throw new Error(data['Error Message']);
            }
            
            // التحقق من وجود بيانات الأسعار (Global Quote)
            const quote = data['Global Quote'];
            if (!quote || Object.keys(quote).length === 0) {
                // في هذه الحالة، الرد لم يحتوِ على بيانات الأسعار بدون رسالة خطأ واضحة
                throw new Error("لم يتم العثور على بيانات الأسعار في الرد. (يُرجى الانتظار دقيقة ومحاولة تشغيل الكود مرة أخرى أو الحصول على مفتاح API خاص بك)");
            }
            // =======================================================

            // استخراج سعر الإغلاق (05. price) وتاريخ التحديث (07. latest trading day)
            const latestPrice = parseFloat(quote['05. price']);
            const latestTradingDay = quote['07. latest trading day'];
            
            // تحويل التاريخ إلى تنسيق عربي
            const date = new Date(latestTradingDay).toLocaleDateString('ar-EG', { dateStyle: 'medium' });

            if (isNaN(latestPrice)) {
                 throw new Error("القيمة المسترجعة للسعر غير صالحة.");
            }
            
            // عرض النتيجة بنجاح
            resultElement.classList.remove('text-red-600', 'bg-red-50', 'border-red-200', 'text-blue-600', 'bg-blue-50', 'border-blue-200');
            resultElement.classList.add('text-green-600', 'bg-green-50', 'border-green-200');
            resultElement.innerHTML = `
                <p><strong>آخر سعر:</strong> $${latestPrice.toFixed(2)}</p>
                <p class="text-sm text-gray-500 mt-2">آخر تحديث: ${date}</p>
            `;

        } catch (error) {
            // عرض رسالة الخطأ
            console.error("Fetch error:", error);
            resultElement.classList.remove('text-blue-600', 'bg-blue-50', 'border-blue-200', 'text-green-600', 'bg-green-50', 'border-green-200');
            resultElement.classList.add('text-red-600', 'bg-red-50', 'border-red-200');
            resultElement.innerHTML = `
                <p>❌ خطأ في جلب البيانات:</p>
                <p class="text-sm mt-2">${error.message}</p>
            `;
        }
    }

    window.onload = fetchStockData;
</script>

</body>
</html>
