<!doctype html>
<html lang="ar" dir="rtl">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		
		<link
			rel="icon"
			href="https://pricealerts.github.io/imgs/web/favicon.ico"
			sizes="any"
		/>
		<link
			rel="canonical"
			href="https://pricealerts.web.app/signin/index.html"
		/>
		<meta
			name="description"
			content="منصة Price Alerts لتنبيه أسعار العملات الرقمية والأسهم العالمية من عشر منصات تداول و 11 بورصة. تنبيهات فورية وسريعة."
		/>
		<meta
			name="keywords"
			content="تنبيه أسعار, عملات رقمية, أسهم, بورصة, تنبيهات سعر, تداول, Binance, KuCoin, nasdaq,nyse, OKX"
		/>
		<meta name="author" content="Price Alerts" />
		<meta name="robots" content="index, follow" />

		<!-- OG Meta for Social shares -->
		<meta
			property="og:title"
			content="Price Alerts - تنبيهات أسعار العملات الرقمية والأسهم"
		/>
		<meta
			property="og:description"
			content="تنبيهات سعرية فورية لـ 10 منصات تداول و 11 بورصة أسهم."
		/>
		<meta property="og:url" content="https://pricealerts.web.app/" />
		<meta property="og:type" content="website" />
		<meta
			property="og:image"
			content="https://pricealerts.web.app/imgs/web/apple-touch-icon.png"
		/>

		<title>مساعد الأسعار الذكي | AI Price Alert</title>
		<link
			rel="stylesheet"
			href="https://pricealerts.github.io/style/navbar.css"
		/>
		<link rel="stylesheet" href="./style.css" />
		<meta name="theme-color" content="#f0f2f5" />
		<link
			rel="icon"
			href="https://pricealerts.github.io/imgs/web/favicon.ico"
			sizes="any"
		/>
		<link
			rel="apple-touch-icon"
			href="https://pricealerts.github.io/imgs/web/apple-touch-icon.png"
		/>
		<link
			rel="shortcut icon"
			type="image/x-icon"
			href="https://pricealerts.github.io/imgs/web/apple-touch-icon.png"
		/>
		<script type="importmap">
			{
				"imports": {
					"@google/generative-ai": "https://esm.run/@google/generative-ai"
				}
			}
		</script>
	</head>
	<body>
		<div class="chat-container">
			<div id="pirantCntynr" class="pirantCntynr" style="padding: 0 20px"></div>
			<div
				style="
					padding: 10px;
					background: #007bff;
					color: white;
					text-align: center;
					font-weight: bold;
				"
			>
				محلل الأسواق الذكي 🤖
			</div>

			<div class="messages-area" id="chat-history">
				<div class="message bot-msg">
					أهلاً بك! أنا مساعدك المالي. اسألني عن أي شيء عن التداول وسأجيبك في
					الحال.
				</div>
			</div>

			<div class="suggestions-area">
				<div
					class="chip"
					onclick="window.sendPrompt('كم سعر البيتكوين (BTC) وحلل اتجاهه؟')"
				>
					💰 سعر البيتكوين
				</div>
				<div
					class="chip"
					onclick="window.sendPrompt('ما هو وضع سهم أبل (AAPL) اليوم؟')"
				>
					🍎 سهم Apple
				</div>
				<!-- <div class="chip" onclick="window.sendPrompt('قارن بين سعر ETH و SOL')">
					⚖️ مقارنة عملات
				</div> -->
				<div class="chip" onclick="window.sendPrompt('تحليل لسهم أرامكو (2222.SR)')">
					🛢️ سهم أرامكو
				</div>
				<div class="chip" onclick="window.sendPrompt('أعطني نصيحة للتداول بشكل جيد')">
					نصيحة إستثمارية 📈
				</div>
			</div>

			<div class="input-area">
				<input
					type="text"
					id="user-input"
					placeholder="اكتب سؤالك هنا..."
					onkeypress="if(event.key === 'Enter') window.sendMessage()"
				/>
				<button id="send-btn" onclick="window.sendMessage()">إرسال</button>
			</div>
		</div>

		<script type="module" src="./js.js"></script>

		<script src="https://pricealerts.github.io/js/navbar.js"></script>
	</body>
</html>
